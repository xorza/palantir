[package]
name = "palantir"
version = "0.1.0"
edition = "2024"
exclude = ["tmp/", "references/"]

[lib]
doctest = false

[dependencies]
bytemuck = { version = "*", features = ["derive"] }
encase = "*"
fixedbitset = "*"
glam = { version = "*", features = ["bytemuck", "encase"] }
glyphon = "*"
rustc-hash = "*"
tracing = "*"
pollster = "*"
thiserror = "*"
wgpu = "*"
winit = "*"
rayon = "*"
padding-struct = "*"
soa-rs = "*"
strum = { version = "*", features = ["derive"] }
serde = { version = "*", features = ["derive"] }
toml = "*"

[dev-dependencies]
backtrace = "*"
criterion = "*"
tracing-subscriber = { version = "*", features = ["env-filter"] }
image = { version = "*", default-features = false, features = ["png"] }

[[bench]]
name = "frame"
harness = false

[[bench]]
name = "caches"
harness = false
required-features = ["internals", "bench-deep"]

[features]
# Exposes `internals::*` (cache reset + introspection helpers used by
# `benches/`). Tests get the same module without the feature because
# `cfg(test)` is also gated on.
internals = []
# Opt-in cache A/B benches. Default `cargo bench` runs only `frame.rs`;
# `cargo bench --features "internals bench-deep"` adds `caches.rs`.
bench-deep = []

[profile.release]
debug = "line-tables-only"

[profile.release-max]
inherits = "release"
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = "symbols"
debug = false
incremental = false



# Optimize heavy dependencies even in dev/test builds
[profile.dev.package.wgpu]
opt-level = 3
[profile.dev.package.wgpu-core]
opt-level = 3
[profile.dev.package.wgpu-hal]
opt-level = 3
[profile.dev.package.wgpu-types]
opt-level = 3
[profile.dev.package.naga]
opt-level = 3
[profile.dev.package.gpu-descriptor]
opt-level = 3
[profile.dev.package.image]
opt-level = 3
[profile.dev.package.spirv]
opt-level = 3
[profile.dev.package.ash]
opt-level = 3
