[workspace]
members = [".", "anim-derive"]

[package]
name = "palantir"
version = "0.1.0"
edition = "2024"
exclude = ["tmp/", "references/"]

[lib]
doctest = false

[dependencies]
palantir-anim-derive = { path = "anim-derive" }
arboard = "*"
bitflags = "*"
bytemuck = { version = "*", features = ["derive"] }
encase = "*"
cosmic-text = "*"
fixedbitset = "*"
glam = { version = "*", features = ["bytemuck", "encase", "serde"] }
etagere = "*"
half = { version = "*", features = ["bytemuck"] }
rustc-hash = "*"
tracing = "*"
pollster = "*"
thiserror = "*"
wgpu = { version = "*", default-features = false, features = ["std", "parking_lot", "wgsl", "vulkan", "metal", "dx12"] }
winit = "*"
rayon = "*"
padding-struct = "*"
soa-rs = "*"
strum = { version = "*", features = ["derive"] }
serde = { version = "*", features = ["derive"] }
toml = "*"
tinyvec = { version = "*", features = ["serde"] }
smol_str = "*"
unicode-segmentation = "*"
profiling = { version = "1.0.18", default-features = false, features = ["procmacros"] }
# Pinned to whatever `profiling/profile-with-tracy` resolves to so cargo
# dedupes to one tracy-client instance (one FFI connection). Bump in
# lockstep with `profiling`.
tracy-client = { version = "0.18", default-features = false, optional = true }
tracing-subscriber = { version = "*", features = ["env-filter"] }

[dev-dependencies]
backtrace = "*"
criterion = "*"
dhat = "*"
gethostname = "*"
image = { version = "*", default-features = false, features = ["png"] }

[[test]]
name = "visual"
path = "tests/visual/main.rs"
required-features = ["internals"]

[[test]]
name = "alloc"
path = "tests/alloc/main.rs"

[[bench]]
name = "frame"
harness = false
required-features = ["internals"]

[[bench]]
name = "alloc_free"
harness = false

[[bench]]
name = "alloc_free_gpu"
harness = false
required-features = ["internals"]

[[bench]]
name = "scrollzoom"
harness = false
required-features = ["internals"]

[[bench]]
name = "text_atlas"
harness = false
required-features = ["internals"]

[[bench]]
name = "input_throughput"
harness = false

[[bench]]
name = "caches"
harness = false
required-features = ["internals"]

[[bench]]
name = "damage"
harness = false
required-features = ["internals"]

[features]
# Exposes `internals::*` (cache reset + introspection helpers used by
# `benches/`). Tests get the same module without the feature because
# `cfg(test)` is also gated on.
internals = []
# Profiler backends — pick one. Off by default (zero overhead).
# Tracy needs an external viewer; wgpu's own GPU zones light up
# automatically because `profiling` is a singleton in the dep graph.
profile-with-tracy = ["profiling/profile-with-tracy", "dep:tracy-client"]
profile-with-puffin = ["profiling/profile-with-puffin"]

[profile.release]
debug = "line-tables-only"
# Thin LTO lets cross-crate generics like `soa_rs::Soa::push` inline
# at their call sites. Without it the per-`open_node` SoA push stays
# an out-of-line call (~2.6 % self in the `frame` bench); with it the
# 5 field stores + len bump fold into the caller. Thin LTO compile
# overhead is ~1.5× the no-LTO baseline; fat LTO (`release-max`)
# adds ~3× more on top.
lto = "thin"

[profile.release-max]
inherits = "release"
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = "symbols"
debug = false
incremental = false



# Optimize heavy dependencies even in dev/test builds
[profile.dev.package.wgpu]
opt-level = 3
[profile.dev.package.wgpu-core]
opt-level = 3
[profile.dev.package.wgpu-hal]
opt-level = 3
[profile.dev.package.wgpu-types]
opt-level = 3
[profile.dev.package.naga]
opt-level = 3
[profile.dev.package.gpu-descriptor]
opt-level = 3
[profile.dev.package.image]
opt-level = 3
[profile.dev.package.spirv]
opt-level = 3
[profile.dev.package.ash]
opt-level = 3
[profile.dev.package.cosmic-text]
opt-level = 3
[profile.dev.package.swash]
opt-level = 3
[profile.dev.package.fontdb]
opt-level = 3
[profile.dev.package.ttf-parser]
opt-level = 3
[profile.dev.package."owned_ttf_parser"]
opt-level = 3
[profile.dev.package.font-types]
opt-level = 3
[profile.dev.package.read-fonts]
opt-level = 3
[profile.dev.package.skrifa]
opt-level = 3
