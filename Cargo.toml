[package]
name = "palantir"
version = "0.1.0"
edition = "2024"
exclude = ["tmp/", "references/"]

[dependencies]
bytemuck = { version = "*", features = ["derive"] }
glam = { version = "*", features = ["bytemuck"] }
glyphon = "*"
rustc-hash = "*"
tracing = "*"
pollster = "*"
thiserror = "*"
wgpu = "*"
winit = "*"
rayon = "*"

[dev-dependencies]
criterion = "*"
tracing-subscriber = { version = "*", features = ["env-filter"] }

[[bench]]
name = "layout"
harness = false

[[bench]]
name = "measure_cache"
harness = false

[[bench]]
name = "encode_cache"
harness = false

[[bench]]
name = "compose_cache"
harness = false
