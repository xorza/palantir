[package]
name = "palantir"
version = "0.1.0"
edition = "2024"
exclude = ["tmp/", "references/"]

[dependencies]
arrayvec = "*"
bytemuck = { version = "*", features = ["derive"] }
glam = "*"
glyphon = "*"
tracing = "*"
pollster = "*"
thiserror = "*"
wgpu = "*"
winit = "*"

[dev-dependencies]
tracing-subscriber = { version = "*", features = ["env-filter"] }
