[package]
name = "palantir"
version = "0.1.0"
edition = "2024"
exclude = ["tmp/", "references/"]

[dependencies]
bytemuck = { version = "*", features = ["derive"] }
glam = { version = "*", features = ["bytemuck"] }
glyphon = "*"
rustc-hash = "*"
tracing = "*"
pollster = "*"
thiserror = "*"
wgpu = "*"
winit = "*"
rayon = "*"

[dev-dependencies]
criterion = "*"
tracing-subscriber = { version = "*", features = ["env-filter"] }

[[bench]]
name = "layout"
harness = false

[[bench]]
name = "measure_cache"
harness = false
required-features = ["bench-support"]

[[bench]]
name = "encode_cache"
harness = false
required-features = ["bench-support"]

[[bench]]
name = "compose_cache"
harness = false
required-features = ["bench-support"]

[features]
# Exposes `bench_support::*` (cache reset + introspection helpers used by
# `benches/`). Enabled automatically for the cache benches via their
# `required-features`. Tests get the same module without the feature
# because `cfg(test)` is also gated on.
bench-support = []
