[package]
name = "palantir"
version = "0.1.0"
edition = "2024"
exclude = ["tmp/", "references/"]

[dependencies]
bytemuck = { version = "*", features = ["derive"] }
glam = "*"
glyphon = "*"
rustc-hash = "*"
tracing = "*"
pollster = "*"
thiserror = "*"
wgpu = "*"
winit = "*"

[dev-dependencies]
criterion = "*"
tracing-subscriber = { version = "*", features = ["env-filter"] }

[[bench]]
name = "layout"
harness = false

[patch.crates-io]
wgpu = { path = "vendor-wgpu/wgpu" }
wgpu-core = { path = "vendor-wgpu/wgpu-core" }
wgpu-hal = { path = "vendor-wgpu/wgpu-hal" }
wgpu-types = { path = "vendor-wgpu/wgpu-types" }
