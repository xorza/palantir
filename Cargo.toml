[package]
name = "palantir"
version = "0.1.0"
edition = "2024"
exclude = ["tmp/", "references/"]

[dependencies]
bytemuck = { version = "*", features = ["derive"] }
encase = "*"
glam = { version = "*", features = ["bytemuck", "encase"] }
glyphon = "*"
rustc-hash = "*"
tracing = "*"
pollster = "*"
thiserror = "*"
wgpu = "*"
winit = "*"
rayon = "*"
padding-struct = "*"

[dev-dependencies]
backtrace = "*"
criterion = "*"
tracing-subscriber = { version = "*", features = ["env-filter"] }
image = { version = "*", default-features = false, features = ["png"] }

[[bench]]
name = "frame"
harness = false

[[bench]]
name = "caches"
harness = false
required-features = ["internals", "bench-deep"]

[features]
# Exposes `internals::*` (cache reset + introspection helpers used by
# `benches/`). Tests get the same module without the feature because
# `cfg(test)` is also gated on.
internals = []
# Opt-in cache A/B benches. Default `cargo bench` runs only `frame.rs`;
# `cargo bench --features "internals bench-deep"` adds `caches.rs`.
bench-deep = []

[profile.release-max]
inherits = "release"
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = "symbols"
debug = false
incremental = false
