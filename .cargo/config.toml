# Apply only to x86_64 targets — `target-cpu=x86-64-v3` is meaningless
# on aarch64 / wasm / etc. and rustc rejects it with "Unknown CPU".
#
# v3 = Haswell/Excavator era and newer: AVX2, BMI1/2, FMA, F16C. F16C
# in particular statically enables the SIMD path in
# `src/primitives/half_simd.rs`, eliminating the runtime CPUID dispatch
# (and cross-crate call boundary) in the layout / cascade hot path that
# unpacks Spacing/Corners/Color/Brush packed-f16 every node. Measured
# -10% on `frame/cached`, -7.6% on `frame/resizing`. Without this flag,
# `half_simd` falls back to the `half` slice path — break-even with
# pre-refactor behavior, no regression.
[target.'cfg(target_arch = "x86_64")']
rustflags = ["-C", "target-cpu=x86-64-v3"]
